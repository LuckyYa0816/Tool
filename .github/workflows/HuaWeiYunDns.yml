name: Sync CF IPs to Huawei Cloud

on:
  workflow_dispatch: 

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip' # 1. 开启官方自带的 pip 依赖缓存

      - name: Install Dependencies
        run: |
          pip install requests huaweicloudsdkdns beautifulsoup4 playwright

      # 2. 新增：缓存 Playwright 浏览器内核，避免每次重新下载 100MB+ 的文件
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      # 3. 新增：如果缓存未命中，才下载 Chromium 浏览器（去掉 --with-deps 大幅提速）
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run Update Script
        env:
          HW_AK: ${{ secrets.HW_AK }}
          HW_SK: ${{ secrets.HW_SK }}
          HW_PROJECT_ID: ${{ secrets.HW_PROJECT_ID }}
          HW_REGION: ${{ secrets.HW_REGION }}
        run: python HuaWeiYunDns.py

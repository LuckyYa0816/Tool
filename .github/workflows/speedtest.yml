name: Test CF Reverse Proxy IP Speed

on:
  workflow_dispatch:        # 允许手动触发

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 要测试的候选 IP
        ip: ["178.128.60.89", "139.59.123.238", "82.40.42.119"]
    steps:
      - name: Test speed via curl
        id: speedtest
        run: |
          # === 请替换为你的反代域名和测试路径 ===
          TEST_URL="https://speed.cloudflare.com/__down?bytes=99999999"  # 建议放一个10MB测速文件

          RESULT=$(curl -w "@-" -o /dev/null -s --resolve "${DOMAIN}:443:${{ matrix.ip }}" "$TEST_URL" <<'EOF'
             TCP 握手耗时: %{time_connect}s\n
             TLS 握手耗时: %{time_appconnect}s\n
             首字节耗时  : %{time_starttransfer}s\n
             总耗时      : %{time_total}s\n
             下载速度    : %{speed_download} bytes/s\n
          EOF
          )
          echo "### ${{ matrix.ip }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$RESULT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

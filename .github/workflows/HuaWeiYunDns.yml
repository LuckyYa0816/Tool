name: Sync CF IPs to Huawei Cloud

on:
  workflow_dispatch: 

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # 💡 移除了 cache: 'pip'，避免找不到 requirements.txt 报错

      - name: Install Dependencies
        run: |
          pip install requests huaweicloudsdkdns beautifulsoup4 playwright

      # ✅ 保留：缓存 Playwright 浏览器内核（这个是提速大头，不需要依赖文件）
      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      # ✅ 保留：若缓存未命中，才重新下载 Chromium
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium

      - name: Run Update Script
        env:
          HW_AK: ${{ secrets.HW_AK }}
          HW_SK: ${{ secrets.HW_SK }}
          HW_PROJECT_ID: ${{ secrets.HW_PROJECT_ID }}
          HW_REGION: ${{ secrets.HW_REGION }}
        run: python HuaWeiYunDns.py

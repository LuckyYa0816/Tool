name: Sync CF IPs to Huawei Cloud

on:
  schedule:
    - cron: '6 * * * *' 
  workflow_dispatch:  

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          # 💡 移除了 cache: 'pip'，避免找不到 requirements.txt 报错

      - name: Install Dependencies
        run: |
          pip install requests huaweicloudsdkdns
          
      - name: Run Update Script
        env:
          HW_AK: ${{ secrets.HW_AK }}
          HW_SK: ${{ secrets.HW_SK }}
          HW_PROJECT_ID: ${{ secrets.HW_PROJECT_ID }}
          HW_REGION: ${{ secrets.HW_REGION }}
        run: python HuaWeiYunDns.py

name: Sync CF IPs to Huawei Cloud

on:
  workflow_dispatch: 

jobs:
  update-dns:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests huaweicloudsdkdns beautifulsoup4 playwright

      - name: Install Playwright Chromium & Deps
        run: |
          playwright install chromium --with-deps

      - name: Run Update Script
        env:
          HW_AK: ${{ secrets.HW_AK }}
          HW_SK: ${{ secrets.HW_SK }}
          HW_PROJECT_ID: ${{ secrets.HW_PROJECT_ID }}
          HW_REGION: ${{ secrets.HW_REGION }}
        run: python HuaWeiYunDns.py
